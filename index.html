<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambodge — avant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Cambodge &mdash; avant</h1>
  </header>

  <main class="gallery">

    <div class="card" style="--rotate: -2deg; --tx: -10px; --ty: 8px;">
      <div class="card-inner">
        <div class="card-front">
          <div class="photo-placeholder"></div>
        </div>
        <div class="card-back">
          <p class="annotation">— annotation —</p>
        </div>
      </div>
    </div>

    <div class="card" style="--rotate: 1.5deg; --tx: 4px; --ty: -12px;">
      <div class="card-inner">
        <div class="card-front">
          <div class="photo-placeholder"></div>
        </div>
        <div class="card-back">
          <p class="annotation">— annotation —</p>
        </div>
      </div>
    </div>

    <div class="card" style="--rotate: -1deg; --tx: 14px; --ty: 5px;">
      <div class="card-inner">
        <div class="card-front">
          <div class="photo-placeholder"></div>
        </div>
        <div class="card-back">
          <p class="annotation">— annotation —</p>
        </div>
      </div>
    </div>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
